<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="top-nav">
        <div class="container nav-inner">
            <div class="brand">
                <span class="shop-icon">🛒</span>
                <span class="brand-text">Phone Shop</span>
            </div>

            <div class="search">
                <input type="text" placeholder="Search products...">
                <button class="search-btn">🔍</button>
            </div>

            <div class="nav-actions">
                <a href="#" class="orders">Orders</a>
                <a href="#" class="cart">Cart <span class="cart-count">2</span></a>
            </div>
        </div>
    </header>

    <section class="hero">
        <div class="hero-overlay"></div>
        <div class="container hero-content">
            <h1>Welcome to Phone Shop</h1>
            <p class="subtitle">Best Products For You</p>
        </div>
    </section>

    <main class="container main-content">
        <section class="featured">
            <h2 class="featured-title">🔥 Featured Products</h2>
            <div class="products-grid">
                <article class="card">
                    <div class="card-media">
                        <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?q=80&w=1200&auto=format&fit=crop&crop=faces" alt="iPhone 17 Lavender">
                    </div>
                    <div class="card-body">
                        <h3>iPhone 17 Lavender</h3>
                        <div class="price">$11.00</div>
                    </div>
                </article>

                <article class="card">
                    <div class="card-media">
                        <img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8?q=80&w=1200&auto=format&fit=crop&crop=faces" alt="MacBook Air M2">
                    </div>
                    <div class="card-body">
                        <h3>MacBook Air M2</h3>
                        <div class="price">$1299.99</div>
                    </div>
                </article>

                <article class="card">
                    <div class="card-media">
                        <img src="airpod.jpeg" alt="AirPods Pro">
                    </div>
                    <div class="card-body">
                        <h3>AirPods Pro</h3>
                        <div class="price">$249.99</div>
                    </div>
                </article>

                <article class="card">
                    <div class="card-media">
                        <img src="air.jpeg" alt="iPad Air">
                    </div>
                    <div class="card-body">
                        <h3>iPad Air</h3>
                        <div class="price">$699.99</div>
                    </div>
                </article>
            </div>
        </section>
    </main>

</body>
</html>
